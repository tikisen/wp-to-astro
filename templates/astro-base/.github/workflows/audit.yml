name: Performance Audit

on:
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types: [completed]
    branches: [main]

jobs:
  audit:
    if: github.event.workflow_run.conclusion == 'success'
    uses: tikisen/tikisen/.github/workflows/audit-psi.yml@main
    with:
      site_url: ${{ vars.PSI_SITE_URL }}
    secrets: inherit
